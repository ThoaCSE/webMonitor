<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Page</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 24px; margin: 0; transition: background 0.4s ease; }
        body.layout-default { background: #f4f4f4; }
        body.layout-alt { background: #eef9ff; }

        .card {
            background: white;
            padding: 18px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.12);
            max-width: 560px;
            margin: auto;
            transition: all 0.4s ease;
        }

        .layout-alt .card {
            background: #1a73e8;
            color: white;
            max-width: 760px;
            border-radius: 24px;
            box-shadow: 0 10px 24px rgba(0,0,0,0.18);
        }

        .title {
            margin-top: 0;
            font-size: 32px;
            color: #202124;
            transition: color 0.4s ease;
        }

        .layout-alt .title {
            color: #fff;
        }

        .message {
            margin-bottom: 18px;
            color: #555;
            transition: color 0.4s ease;
        }

        .layout-alt .message {
            color: #dbe9ff;
        }

        .value {
            font-size: 28px;
            font-weight: bold;
            color: #1a73e8;
            margin-bottom: 18px;
            transition: color 0.4s ease, font-size 0.4s ease;
        }

        .layout-alt .value {
            color: #fff;
            font-size: 34px;
        }
    </style>
</head>
<body class="layout-default">
    <div class="card" id="pageCard">
        <h1 class="title">Dynamic HTML Test Page</h1>
        <p class="message">This page switches layout and size every second.</p>
        <div class="value" id="randomValue">...</div>
        <p class="message">The page alternates between two default layouts, so both HTML structure and rendered size change.</p>
    </div>

    <script>
        const randomValue = document.getElementById('randomValue');
        const body = document.body;
        const card = document.getElementById('pageCard');

        function updatePage() {
            const value = Math.floor(Math.random() * 1000000).toString().padStart(6, '0');
            randomValue.textContent = value;

            if (body.classList.contains('layout-default')) {
                body.classList.remove('layout-default');
                body.classList.add('layout-alt');
            } else {
                body.classList.remove('layout-alt');
                body.classList.add('layout-default');
            }
        }

        updatePage();
        setInterval(updatePage, 1000);
    </script>
</body>
</html>
