<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Static HTML Page</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 24px; background: #fffbe6; }
        .container { max-width: 760px; margin: 0 auto; }
        h1 { color: #333; }
        p, li { line-height: 1.6; color: #4a4a4a; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Static HTML Test Page</h1>
        <p>This page has fixed size, fixed text, and fixed HTML structure.</p>
        <ul>
            <li>Page title: Static HTML Page</li>
            <li>Content type: fixed text</li>
            <li>Layout: stable structure</li>
        </ul>
        <p>Use this page to verify that the monitor detects no changes when the page remains constant.</p>
    </div>
</body>
</html>
